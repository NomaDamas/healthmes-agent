# XcodeGen spec for the HealthMes iOS/watchOS companion (GitHub issue #7).
#
# Regenerate the project after editing this file or adding sources:
#   brew install xcodegen        # once
#   cd apps/ios-companion && xcodegen generate
#
# Everything here is simulator-only plumbing: build with
# CODE_SIGNING_ALLOWED=NO and never configure signing identities in this
# repo (see README.md). The generated .xcodeproj and Support/ files are
# derived artifacts and gitignored.
name: HealthMesCompanion
options:
  bundleIdPrefix: com.healthmes
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  # ---------------------------------------------------------------- iOS app
  # One pairing screen: base URL + bearer token of the user's own healthmes
  # instance. Local-first: that URL is the only network destination.
  HealthMesCompanion:
    type: application
    platform: iOS
    sources:
      - Sources/Shared
      - Sources/App
    dependencies:
      - target: HealthMesWidgets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.healthmes.companion
        TARGETED_DEVICE_FAMILY: "1"
    info:
      path: Support/HealthMesCompanion-Info.plist
      properties:
        CFBundleDisplayName: HealthMes
        UILaunchScreen: {}
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        ITSAppUsesNonExemptEncryption: false
        # Same rationale as apps/android-usage usesCleartextTraffic: the
        # typical pairing target is http://<LAN-IP>:8100 on the user's own
        # network. Prefer HTTPS for anything reachable beyond the LAN.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    entitlements:
      path: Support/HealthMesCompanion.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.healthmes.companion

  # ------------------------------------------- iOS home + lock-screen widgets
  HealthMesWidgets:
    type: app-extension
    platform: iOS
    sources:
      - Sources/Shared
      - Sources/SharedWidget
      - Sources/Widgets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.healthmes.companion.widgets
        TARGETED_DEVICE_FAMILY: "1"
        SKIP_INSTALL: true
    info:
      path: Support/HealthMesWidgets-Info.plist
      properties:
        CFBundleDisplayName: HealthMes Glance
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    entitlements:
      path: Support/HealthMesWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.healthmes.companion

  # ------------------------------------------------------------- watchOS app
  # Modern single-target watch app. Declared as companion of the iOS app so
  # WatchConnectivity can push the pairing from the phone; it can also run
  # (and fetch) independently once paired. NOT embedded into the iOS app —
  # distribution embedding is out of scope until real-device signing exists
  # (README "not yet verified").
  HealthMesWatchApp:
    type: application
    platform: watchOS
    sources:
      - Sources/Shared
      - Sources/WatchApp
    dependencies:
      - target: HealthMesWatchWidgets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.healthmes.companion.watchkitapp
        TARGETED_DEVICE_FAMILY: "4"
    info:
      path: Support/HealthMesWatchApp-Info.plist
      properties:
        CFBundleDisplayName: HealthMes
        WKApplication: true
        WKCompanionAppBundleIdentifier: com.healthmes.companion
        WKRunsIndependentlyOfCompanionApp: true
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    entitlements:
      path: Support/HealthMesWatchApp.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.healthmes.companion

  # -------------------------------------------------- watchOS complications
  HealthMesWatchWidgets:
    type: app-extension
    platform: watchOS
    sources:
      - Sources/Shared
      - Sources/SharedWidget
      - Sources/WatchWidgets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.healthmes.companion.watchkitapp.widgets
        TARGETED_DEVICE_FAMILY: "4"
        SKIP_INSTALL: true
    info:
      path: Support/HealthMesWatchWidgets-Info.plist
      properties:
        CFBundleDisplayName: HealthMes Energy
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    entitlements:
      path: Support/HealthMesWatchWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.healthmes.companion

  # ------------------------------------------------------------------ tests
  # Host-less unit-test bundle: compiles Sources/Shared directly, so the
  # GlanceClient contract tests run without launching any app.
  HealthMesCompanionTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Sources/Shared
      - path: Tests/GlanceClientTests.swift
      - path: Tests/Fixtures
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.healthmes.companion.tests
    info:
      path: Support/HealthMesCompanionTests-Info.plist
      properties: {}

schemes:
  HealthMesCompanion:
    build:
      targets:
        HealthMesCompanion: all
    test:
      targets:
        - HealthMesCompanionTests
  HealthMesWatchApp:
    build:
      targets:
        HealthMesWatchApp: all
