# Apple companion apps CI (issues #10/#11) — unsigned simulator/native builds
# for apps/ios-companion (iOS + watchOS) and apps/macos-companion (menu bar
# app + WidgetKit extension + screensaver bundle), plus their XCTest suites.
#
# Independent from ci.yml on purpose (like windows-apps.yml): it only wakes up
# when an Apple app changes. Both jobs run when either directory changes
# because the macOS targets compile apps/ios-companion/Sources/Shared verbatim
# (one contract/client across Apple platforms — see the app READMEs).
#
# Signing stays untouched everywhere (CODE_SIGNING_ALLOWED=NO): CI proves
# compilation + unit tests, never distribution. The iOS UI tests XCTSkip
# without a live paired healthmes instance, so plain CI runs stay green.

name: Apple apps

on:
  pull_request:
    paths:
      - "apps/ios-companion/**"
      - "apps/macos-companion/**"
      - ".github/workflows/apple-apps.yml"
  push:
    branches: [main]
    paths:
      - "apps/ios-companion/**"
      - "apps/macos-companion/**"
      - ".github/workflows/apple-apps.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ios:
    name: xcodebuild iOS + watchOS (simulators, unsigned)
    runs-on: macos-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: apps/ios-companion
    steps:
      - uses: actions/checkout@v4

      - name: Select the newest stable Xcode on the runner
        # The runner image ships several Xcodes; the default is not always
        # the newest. The apps target recent SDKs, so pick the highest
        # non-beta version present.
        run: |
          XCODE_APP="$(ls -d /Applications/Xcode_*.app | grep -iv beta | sort -V | tail -1)"
          echo "selecting ${XCODE_APP}"
          sudo xcode-select -s "${XCODE_APP}/Contents/Developer"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Ensure the watchOS simulator platform is present
        # A no-op when the image already bundles it; downloads it otherwise.
        run: xcodebuild -downloadPlatform watchOS || sudo xcodebuild -downloadPlatform watchOS

      - name: Generate the Xcode project
        run: xcodegen generate

      - name: Build iOS app + widget extension (incl. Live Activity)
        run: >
          xcodebuild -project HealthMesCompanion.xcodeproj
          -scheme HealthMesCompanion
          -destination "generic/platform=iOS Simulator"
          build CODE_SIGNING_ALLOWED=NO

      - name: Build watchOS app + complication extension
        run: >
          xcodebuild -project HealthMesCompanion.xcodeproj
          -scheme HealthMesWatchApp
          -destination "generic/platform=watchOS Simulator"
          build CODE_SIGNING_ALLOWED=NO

      - name: Unit + UI tests on an iPhone simulator
        # Pick an iPhone from the newest installed iOS runtime instead of
        # hardcoding a device name the image may not ship. UI tests self-skip
        # without a live paired instance (apps/ios-companion/README.md).
        run: |
          xcrun simctl list devices available --json > "${RUNNER_TEMP}/simulators.json"
          UDID="$(python3 - "${RUNNER_TEMP}/simulators.json" <<'PY'
          import json
          import re
          import sys

          devices = json.load(open(sys.argv[1]))["devices"]
          best = None
          for runtime, entries in devices.items():
              match = re.search(r"iOS-(\d+)-(\d+)", runtime)
              if not match:
                  continue
              version = (int(match.group(1)), int(match.group(2)))
              for device in entries:
                  if device.get("isAvailable") and device["name"].startswith("iPhone"):
                      if best is None or version > best[0]:
                          best = (version, device["name"], device["udid"])
          if best is None:
              sys.exit("no available iPhone simulator on this runner")
          print(f"picked {best[1]} (iOS {best[0][0]}.{best[0][1]})", file=sys.stderr)
          print(best[2])
          PY
          )"
          xcodebuild test -project HealthMesCompanion.xcodeproj \
            -scheme HealthMesCompanion \
            -destination "platform=iOS Simulator,id=${UDID}" \
            CODE_SIGNING_ALLOWED=NO

  macos:
    name: xcodebuild macOS menu bar + widgets + saver (unsigned)
    runs-on: macos-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: apps/macos-companion
    steps:
      - uses: actions/checkout@v4

      - name: Select the newest stable Xcode on the runner
        run: |
          XCODE_APP="$(ls -d /Applications/Xcode_*.app | grep -iv beta | sort -V | tail -1)"
          echo "selecting ${XCODE_APP}"
          sudo xcode-select -s "${XCODE_APP}/Contents/Developer"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate the Xcode project
        run: xcodegen generate

      - name: Build menu bar app (embeds the widget extension)
        run: >
          xcodebuild -project HealthMesMac.xcodeproj -scheme HealthMesMac
          -destination "platform=macOS" build CODE_SIGNING_ALLOWED=NO

      - name: Build widget extension standalone
        run: >
          xcodebuild -project HealthMesMac.xcodeproj -scheme HealthMesMacWidgets
          -destination "platform=macOS" build CODE_SIGNING_ALLOWED=NO

      - name: Build screensaver bundle
        run: >
          xcodebuild -project HealthMesMac.xcodeproj -scheme HealthMesSaver
          -destination "platform=macOS" build CODE_SIGNING_ALLOWED=NO

      - name: Unit tests (native macOS)
        run: >
          xcodebuild test -project HealthMesMac.xcodeproj -scheme HealthMesMac
          -destination "platform=macOS" CODE_SIGNING_ALLOWED=NO
