# Alembic configuration for the healthmes database (docs/PLAN.md §2).
# Layout and logging follow vendor/open-wearables/backend/alembic.ini.
#
# The database URL is intentionally left empty: alembic/env.py resolves it
# from (highest priority first) `-x db_url=...`, this file's sqlalchemy.url
# when set programmatically, then Settings.database_url (HEALTHMES_DATABASE_URL,
# default repo-local sqlite) — never a hardcoded docker hostname.

[alembic]
# %(here)s = directory of this file, so alembic works from any cwd.
script_location = %(here)s/alembic
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s
prepend_sys_path = .
path_separator = os
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
